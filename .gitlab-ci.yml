image: python:3.12

stages:
  - lint

before_script:
  - python -m pip install --upgrade pip
  - pip install -r requirements.txt

black:
  stage: lint
  script:
    - black --check .

flake8:
  stage: lint
  script:
    - flake8 .

mypy:
  stage: lint
  script:
    - mypy .

