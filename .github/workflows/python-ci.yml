name: Python CI & Deployment

on:
  push:
    branches:
      - master
      - Py_git
  pull_request:
    branches:
      - master
  # Добавляем триггер ручного запуска пайплайна из веб-интерфейса GitHub
  workflow_dispatch:

jobs:
  # --- СТАДИЯ 1: Линтеры и статический анализ в облаке GitHub ---
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show Black version
        run: black --version

      - name: Black
        run: black --check .

      - name: Flake8
        run: flake8 .

      - name: Mypy
        run: mypy .

  # --- СТАДИЯ 2: Юнит-тесты в облаке GitHub ---
  test:
    # Запускаем тесты только после того, как линтеры отработали без ошибок
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pytest
        run: pytest

  # --- СТАДИЯ 3: Деплой на вашем Self-Hosted раннере ---
  deploy:
    # Деплой начнется только после успешного выполнения стадии тестов
    needs: test
    # Условие: запускаем авто-деплой только из ветки master ПРИ push ИЛИ при ручном клике (workflow_dispatch)
    if: |
      (github.ref == 'refs/heads/master' && github.event_name == 'push') || 
      (github.event_name == 'workflow_dispatch')
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Run FastAPI Application Scripts
        run: |
          echo "=== 1. Проверяем окружение ==="
          if [ ! -d ".venv" ]; then
            python3 -m venv .venv
          fi
          
          echo "=== 2. Активируем .venv и обновляем pip ==="
          source .venv/bin/activate
          pip install --upgrade pip
          
          echo "=== 3. Устанавливаем зависимости на сервере ==="
          pip install -r requirements.txt
          
          echo "=== 4. Сборка Docker-образа локально ==="
          docker build -t fastapi-project .
          
          echo "=== 5. Перезапуск контейнера на порту 8001 ==="
          docker stop fastapi-app || true
          docker rm fastapi-app || true
          
          docker run -d --name fastapi-app --restart always -p 8001:8001 fastapi-project
          
          echo "=== 6. Проверка статуса запущенного контейнера ==="
          docker ps -a





