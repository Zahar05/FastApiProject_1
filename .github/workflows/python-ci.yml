name: Python CI & Deployment

on:
  push:
    branches:
      - master
      - Py_git
  pull_request:
    branches:
      - master

jobs:
  # --- СТАДИЯ 1: Тестирование в облаке GitHub ---
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show Black version
        run: black --version

      - name: Black
        run: black --check .

      - name: Flake8
        run: flake8 .

      - name: Mypy
        run: mypy .

      - name: Pytest
        run: pytest

  # --- СТАДИЯ 2: Запуск и деплой на вашем Self-Hosted раннере ---
  deploy:
    # Запускаем только после успешного выполнения джобы 'test'
    needs: test
    # Запускаем деплой только при пуше в master (чтобы не деплоить сырые ветки из Pull Request)
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    # Указываем ваш собственный раннер FastRunner
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Run FastAPI Application Scripts
        run: |
          echo "=== 1. Проверяем окружение ==="
          if [ ! -d ".venv" ]; then
            python3 -m venv .venv
          fi
          
          echo "=== 2. Активируем .venv и обновляем pip ==="
          source .venv/bin/activate
          pip install --upgrade pip
          
          echo "=== 3. Устанавливаем зависимости на сервере ==="
          pip install -r requirements.txt
          
          echo "=== 4. Сборка Docker-образа локально ==="
          # Перенесли сборку Docker сюда, чтобы образ создавался прямо на вашем компьютере/сервере
          docker build -t fastapi-project .
          
          echo "=== 5. Скрипты успешно выполнены! ==="



