name: Python CI

on:
  push:
    branches:
      - master
      - Py_git

  pull_request:
    branches:
      - master

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show Black version
        run: black --version

      - name: Black
        run: black --check .

      - name: Flake8
        run: flake8 .

      - name: Mypy
        run: mypy .

      - name: Pytest
        run: pytest

      - name: Build Docker image
        run: docker build -t fastapi-project .
